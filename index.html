<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>১৬ গুটি - Telegram Mini App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; }
        
        body { background: #3e2723; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        .screen { display: none; width: 100%; max-width: 380px; padding: 15px; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .screen.active { display: flex; }

        .title { color: #f5f5f5; font-size: 2rem; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .mode-btn { background: #d7ccc8; border: 2px solid #5d4037; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; color: #3e2723; margin: 10px 0; width: 100%; transition: 0.2s; }
        .mode-btn.selected { background: #4caf50; color: white; border-color: #2e7d32; }
        .start-btn { background: #ff9800; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 1.2rem; font-weight: bold; margin-top: 20px; cursor: pointer; display: none; }
        .start-btn.show { display: block; }

        .inst-box { background: rgba(255, 243, 224, 0.95); border: 2px solid #8d6e63; border-radius: 8px; padding: 20px; text-align: center; font-size: 1.1rem; color: #3e2723; margin-bottom: 20px; line-height: 1.5; }
        .inst-box span { color: #2e7d32; font-weight: bold; }
        .ok-btn { background: #4caf50; color: #fff; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1.1rem; width: 100%; }

        .player-card { background: #f5f5f5; border: 2px solid #8d6e63; border-radius: 6px; padding: 6px 10px; width: 100%; text-align: center; margin: 3px 0; transition: background-color 0.2s; position: relative; }
        .player-card.active-turn { background: #4caf50; border-color: #2e7d32; color: #fff; }
        .player-card.action-done { background: #ffeb3b; color: #333; cursor: pointer; border-color: #fbc02d; }
        .rotated { transform: rotate(180deg); }
        
        .card-header { font-size: 1rem; font-weight: bold; }
        .instruction-text { font-size: 0.8rem; font-weight: bold; min-height: 15px; margin-top: 2px; }

        .rotate-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.1); padding: 3px 5px; border-radius: 4px; margin-bottom: 3px; font-size: 0.75rem; }
        .btn-rotate { background: #fff; border: 1px solid #333; color: #333; padding: 2px 6px; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }

        .captured-area { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; min-height: 12px; margin-top: 3px; }
        .eaten-piece { width: 10px; height: 10px; border-radius: 50%; }
        .eaten-white { background: #e0ccaa; border: 1px solid #8d6e63; }
        .eaten-black { background: #2c2c2c; border: 1px solid #000; }

        canvas { background: #d7ccc8; border: 4px solid #5d4037; border-radius: 6px; width: 100%; max-width: 380px; height: auto; touch-action: none; margin: 2px 0; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #fff3e0; padding: 25px 20px; border-radius: 12px; text-align: center; border: 4px solid #8d6e63; width: 85%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: popIn 0.3s ease-out; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .winner-title { font-size: 1.5rem; font-weight: bold; color: #d84315; margin-bottom: 15px; }
        .modal-btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; width: 100%; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .btn-play-again { background: #4caf50; color: #fff; border: 2px solid #2e7d32; }
        .btn-play-again:active { background: #388e3c; }
        .btn-home { background: #6d4c41; color: #fff; border: 2px solid #4e342e; }
        .btn-home:active { background: #5d4037; }
    </style>
</head>
<body>

    <div id="screen-start" class="screen active">
        <h1 class="title">১৬ গুটি</h1>
        <button id="btn-friend" class="mode-btn" onclick="selectMode('friend')">বন্ধুর সাথে</button>
        <button id="btn-ai" class="mode-btn" onclick="selectMode('ai')">কম্পিউটারের সাথে</button>
        <button id="btn-start-now" class="start-btn" onclick="goToScreen('screen-instruction')">Start Now</button>
    </div>

    <div id="screen-instruction" class="screen">
        <div class="inst-box">
            <strong>খেলার নিয়ম:</strong><br><br>
            আপনার গুটির চাল দেওয়া শেষ হলে <span>রঙিন আইডি কার্ডে</span> ক্লিক করে চাল সম্পন্ন করুন।<br>
            প্রতিপক্ষের গুটি খেতে গুটির উপর দিয়ে লাফ দিন।
        </div>
        <button class="ok-btn" onclick="startGame()">OK</button>
    </div>

    <div id="screen-game" class="screen">
        <div id="p1-card" class="player-card" onclick="attemptEndTurn(1)">
            <div class="rotate-bar">
                <span>কার্ডটি ঘোরাতে ➔</span>
                <button class="btn-rotate" onclick="toggleRotation(event)">🔄 Rotate</button>
            </div>
            <div class="card-header">সাদা গুটি (Player 1)</div>
            <div id="p1-captured" class="captured-area"></div>
            <div id="p1-msg" class="instruction-text">আপনার চাল দিন...</div>
        </div>

        <canvas id="gameBoard" width="360" height="480"></canvas>

        <div id="p2-card" class="player-card" onclick="attemptEndTurn(2)">
            <div class="card-header" id="p2-name">কালো গুটি (Player 2)</div>
            <div id="p2-captured" class="captured-area"></div>
            <div id="p2-msg" class="instruction-text"></div>
        </div>
    </div>

    <div id="winner-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="winner-text" class="winner-title">সাদা গুটি জিতেছে! 🎉</div>
            <button class="modal-btn btn-play-again" onclick="playAgain()">আবার খেলুন</button>
            <button class="modal-btn btn-home" onclick="goHome()">হোমে ফিরে যান</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        
        let isAIMode = false;
        let nodes = [];
        let currentPlayer = 1; 
        let selectedNode = null;
        let turnState = { hasMoved: false, hasCaptured: false, lockedPiece: null };
        let p1CapturedCount = 0; let p2CapturedCount = 0; 
        let gameActive = false;
        const scale = 45; 
        
        const logicalNodes = [
            { id: 0, x: 2, y: -2, p: 1 }, { id: 1, x: 1, y: -1, p: 1 }, { id: 2, x: 2, y: -1, p: 1 }, { id: 3, x: 3, y: -1, p: 1 },
            { id: 4, x: 0, y: 0, p: 1 }, { id: 5, x: 1, y: 0, p: 1 }, { id: 6, x: 2, y: 0, p: 1 }, { id: 7, x: 3, y: 0, p: 1 }, { id: 8, x: 4, y: 0, p: 1 },
            { id: 9, x: 0, y: 1, p: 1 }, { id: 10, x: 1, y: 1, p: 1 }, { id: 11, x: 2, y: 1, p: 1 }, { id: 12, x: 3, y: 1, p: 1 }, { id: 13, x: 4, y: 1, p: 1 },
            { id: 14, x: 0, y: 2, p: 0 }, { id: 15, x: 1, y: 2, p: 0 }, { id: 16, x: 2, y: 2, p: 0 }, { id: 17, x: 3, y: 2, p: 0 }, { id: 18, x: 4, y: 2, p: 0 },
            { id: 19, x: 0, y: 3, p: 2 }, { id: 20, x: 1, y: 3, p: 2 }, { id: 21, x: 2, y: 3, p: 2 }, { id: 22, x: 3, y: 3, p: 2 }, { id: 23, x: 4, y: 3, p: 2 },
            { id: 24, x: 0, y: 4, p: 2 }, { id: 25, x: 1, y: 4, p: 2 }, { id: 26, x: 2, y: 4, p: 2 }, { id: 27, x: 3, y: 4, p: 2 }, { id: 28, x: 4, y: 4, p: 2 },
            { id: 29, x: 1, y: 5, p: 2 }, { id: 30, x: 2, y: 5, p: 2 }, { id: 31, x: 3, y: 5, p: 2 }, { id: 32, x: 2, y: 6, p: 2 }
        ];

        function goToScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function selectMode(mode) {
            isAIMode = mode === 'ai';
            document.getElementById('btn-friend').classList.toggle('selected', !isAIMode);
            document.getElementById('btn-ai').classList.toggle('selected', isAIMode);
            document.getElementById('btn-start-now').classList.add('show');
            document.getElementById('p2-name').innerText = isAIMode ? "কালো গুটি (Computer)" : "কালো গুটি (Player 2)";
        }

        function startGame() {
            goToScreen('screen-game');
            resetGame();
        }

        function playAgain() {
            document.getElementById('winner-modal').classList.remove('active');
            resetGame();
        }

        function goHome() {
            document.getElementById('winner-modal').classList.remove('active');
            gameActive = false;
            document.getElementById('btn-start-now').classList.remove('show');
            document.getElementById('btn-friend').classList.remove('selected');
            document.getElementById('btn-ai').classList.remove('selected');
            goToScreen('screen-start');
        }

        function toggleRotation(event) { event.stopPropagation(); document.getElementById('p1-card').classList.toggle('rotated'); }

        function showWinner(message) {
            gameActive = false;
            document.getElementById('winner-text').innerText = message;
            document.getElementById('winner-modal').classList.add('active');
        }

        function isNeighbor(n1, n2) {
            let dx = Math.abs(n1.x - n2.x); let dy = Math.abs(n1.y - n2.y);
            if (dx > 1 || dy > 1) return false;
            if (dx === 1 && dy === 1 && (n1.x + n1.y) % 2 !== 0) return false; 
            return true;
        }

        function getJumpedNode(from, to) {
            let dx = to.x - from.x; let dy = to.y - from.y;
            if (Math.abs(dx) <= 2 && Math.abs(dy) <= 2 && (Math.abs(dx) === 2 || Math.abs(dy) === 2)) {
                if (Math.abs(dx) === 2 && Math.abs(dy) === 2 && (from.x + from.y) % 2 !== 0) return null;
                return nodes.find(n => n.x === from.x + dx / 2 && n.y === from.y + dy / 2);
            }
            return null;
        }

        function getValidJumps(player) {
            let jumps = [];
            let pieces = nodes.filter(n => n.piece === player);
            pieces.forEach(p => {
                nodes.filter(n => n.piece === 0).forEach(empty => {
                    let jumped = getJumpedNode(p, empty);
                    if (jumped && jumped.piece !== 0 && jumped.piece !== player) {
                        jumps.push({ from: p, to: empty, eaten: jumped });
                    }
                });
            });
            return jumps;
        }

        function getValidMoves(player) {
            let moves = [];
            let pieces = nodes.filter(n => n.piece === player);
            pieces.forEach(p => {
                nodes.filter(n => n.piece === 0).forEach(empty => {
                    if (isNeighbor(p, empty)) moves.push({ from: p, to: empty });
                });
            });
            return moves;
        }

        // ইনস্ট্যান্ট উইন চেক (যেকোনো অ্যাকশনের পর)
        function checkInstantWin() {
            let whiteCount = nodes.filter(n => n.piece === 1).length;
            let blackCount = nodes.filter(n => n.piece === 2).length;
            
            if (whiteCount === 0) {
                showWinner(isAIMode ? "কম্পিউটার জিতেছে! 💻" : "কালো গুটি জিতেছে! 🎉");
                return true;
            }
            if (blackCount === 0) {
                showWinner("সাদা গুটি জিতেছে! 🎉");
                return true;
            }
            return false;
        }

        function resetGame() {
            const centerX = canvas.width / 2;
            nodes = logicalNodes.map(n => ({ ...n, px: centerX + (n.x - 2) * scale, py: 30 + (n.y + 2) * scale, piece: n.p }));
            currentPlayer = 1; selectedNode = null;
            turnState = { hasMoved: false, hasCaptured: false, lockedPiece: null };
            p1CapturedCount = 0; p2CapturedCount = 0;
            gameActive = true;
            updateUI(); drawBoard();
        }

        function updateUI() {
            document.getElementById('p1-captured').innerHTML = Array(p1CapturedCount).fill('<div class="eaten-piece eaten-black"></div>').join('');
            document.getElementById('p2-captured').innerHTML = Array(p2CapturedCount).fill('<div class="eaten-piece eaten-white"></div>').join('');
            
            let actionDone = turnState.hasMoved || turnState.hasCaptured;
            
            let p1Card = document.getElementById('p1-card'); let p1Msg = document.getElementById('p1-msg');
            p1Card.className = `player-card ${currentPlayer === 1 ? 'active-turn' : ''} ${currentPlayer === 1 && actionDone ? 'action-done' : ''}`;
            if(currentPlayer === 1) p1Msg.innerText = actionDone ? "✓ চাল শেষ করতে এখানে ক্লিক করুন" : "আপনার চাল দিন..."; else p1Msg.innerText = "";

            let p2Card = document.getElementById('p2-card'); let p2Msg = document.getElementById('p2-msg');
            p2Card.className = `player-card ${currentPlayer === 2 ? 'active-turn' : ''} ${currentPlayer === 2 && actionDone && !isAIMode ? 'action-done' : ''}`;
            if(currentPlayer === 2) p2Msg.innerText = isAIMode ? "কম্পিউটার ভাবছে..." : (actionDone ? "✓ চাল শেষ করতে এখানে ক্লিক করুন" : "আপনার চাল দিন..."); else p2Msg.innerText = "";
        }

        function attemptEndTurn(playerNum) {
            if (!gameActive || (isAIMode && playerNum === 2)) return; 
            if (currentPlayer === playerNum && (turnState.hasMoved || turnState.hasCaptured)) {
                endTurnLogic();
            }
        }

        function endTurnLogic() {
            // ব্লক (Blockage) চেক
            let nextPlayer = currentPlayer === 1 ? 2 : 1;
            let moves = getValidMoves(nextPlayer);
            let jumps = getValidJumps(nextPlayer);
            
            if (moves.length === 0 && jumps.length === 0) {
                if (currentPlayer === 1) showWinner("সাদা গুটি জিতেছে! 🎉 (ব্লক)");
                else showWinner(isAIMode ? "কম্পিউটার জিতেছে! 💻 (ব্লক)" : "কালো গুটি জিতেছে! 🎉 (ব্লক)");
                return;
            }

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            selectedNode = null;
            turnState = { hasMoved: false, hasCaptured: false, lockedPiece: null };
            updateUI(); drawBoard();

            if (isAIMode && currentPlayer === 2 && gameActive) {
                setTimeout(() => makeAIMove(), 900);
            }
        }

        // --- SMART AI LOGIC (Hard Mode) ---
        function getSmartAIMove(forcedStartNode = null) {
            let jumps = getValidJumps(2);
            if (forcedStartNode) jumps = jumps.filter(j => j.from === forcedStartNode);

            // যদি লাফ দেওয়ার অপশন থাকে
            if (jumps.length > 0) {
                let bestJump = jumps[0];
                let bestScore = -Infinity;
                
                for (let j of jumps) {
                    // সিমিউলেশন: লাফ দিলে কি হবে
                    j.to.piece = 2; j.from.piece = 0; let eatenOrig = j.eaten.piece; j.eaten.piece = 0;
                    
                    let oppJumps = getValidJumps(1);
                    let score = 100 - (oppJumps.length * 50); // ফাঁদে পা না দেওয়ার চেষ্টা
                    
                    if (score > bestScore) { bestScore = score; bestJump = j; }
                    
                    // আগের অবস্থায় ফেরত
                    j.to.piece = 0; j.from.piece = 2; j.eaten.piece = eatenOrig;
                }
                return { type: 'jump', move: bestJump };
            }

            if (forcedStartNode) return null;

            // যদি লাফ দেওয়ার অপশন না থাকে
            let moves = getValidMoves(2);
            if (moves.length === 0) return null;

            let bestMoves = [];
            let bestScore = -Infinity;

            for (let m of moves) {
                m.to.piece = 2; m.from.piece = 0;
                
                let oppJumps = getValidJumps(1); // প্লেয়ার কি লাফ দিতে পারবে?
                let myNextJumps = getValidJumps(2);
                
                let score = 0;
                if (oppJumps.length > 0) score -= oppJumps.length * 1000; // সুইসাইড চাল থেকে বিরত থাকা
                score += myNextJumps.length * 50; // ভবিষ্যৎ অ্যাটাকের প্রস্তুতি
                if (m.to.id >= 4 && m.to.id <= 13) score += 5; // সেন্টারে থাকার চেষ্টা

                m.to.piece = 0; m.from.piece = 2;

                if (score > bestScore) {
                    bestScore = score;
                    bestMoves = [m];
                } else if (score === bestScore) {
                    bestMoves.push(m);
                }
            }
            
            let finalMove = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            return { type: 'move', move: finalMove };
        }

        function makeAIMove(forcedStartNode = null) {
            if(!gameActive) return;

            let action = getSmartAIMove(forcedStartNode);

            if (action && action.type === 'jump') {
                executeAIAction(action.move.from, action.move.to, action.move.eaten);
                if (!checkInstantWin()) { // উইন চেক
                    let moreJumps = getValidJumps(2).filter(j => j.from === action.move.to);
                    if (moreJumps.length > 0) {
                        setTimeout(() => makeAIMove(action.move.to), 500); 
                        return;
                    }
                }
            } else if (action && action.type === 'move') {
                executeAIAction(action.move.from, action.move.to, null);
                checkInstantWin();
            }
            
            if(gameActive) setTimeout(endTurnLogic, 500);
        }

        function executeAIAction(from, to, eaten) {
            to.piece = 2; from.piece = 0;
            if (eaten) { eaten.piece = 0; p2CapturedCount++; }
            drawBoard();
        }
        // --------------------------------

        canvas.addEventListener('pointerdown', (e) => {
            if (!gameActive || (isAIMode && currentPlayer === 2)) return; 

            const rect = canvas.getBoundingClientRect();
            const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);

            let clickedNode = nodes.find(n => Math.hypot(n.px - clickX, n.py - clickY) < 20);
            if (!clickedNode) return;

            if (turnState.hasMoved) return; 
            if (turnState.hasCaptured && clickedNode.piece !== 0 && clickedNode !== turnState.lockedPiece) return;

            if (selectedNode) {
                if (clickedNode.piece === 0) {
                    let jumpedEnemy = getJumpedNode(selectedNode, clickedNode);
                    if (jumpedEnemy && jumpedEnemy.piece !== 0 && jumpedEnemy.piece !== currentPlayer) {
                        if (currentPlayer === 1) p1CapturedCount++; else p2CapturedCount++;
                        clickedNode.piece = currentPlayer; selectedNode.piece = 0; jumpedEnemy.piece = 0;
                        turnState.hasCaptured = true; turnState.lockedPiece = clickedNode; selectedNode = clickedNode; 
                        
                        updateUI();
                        if (checkInstantWin()) return; // তাৎক্ষণিক উইন চেক

                    } else if (!turnState.hasCaptured && isNeighbor(selectedNode, clickedNode)) {
                        clickedNode.piece = currentPlayer; selectedNode.piece = 0;
                        turnState.hasMoved = true; selectedNode = null; 
                        updateUI();
                    }
                } else if (clickedNode.piece === currentPlayer && !turnState.hasCaptured) {
                    selectedNode = clickedNode; 
                }
            } else {
                if (clickedNode.piece === currentPlayer) selectedNode = clickedNode;
            }
            drawBoard();
        });

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#3e2723"; ctx.lineWidth = 2;
            for(let i=0; i<nodes.length; i++) {
                for(let j=i+1; j<nodes.length; j++) {
                    if(isNeighbor(nodes[i], nodes[j])) {
                        ctx.beginPath(); ctx.moveTo(nodes[i].px, nodes[i].py); ctx.lineTo(nodes[j].px, nodes[j].py); ctx.stroke();
                    }
                }
            }

            nodes.forEach(node => {
                ctx.beginPath(); ctx.arc(node.px, node.py, 3, 0, Math.PI * 2); ctx.fillStyle = "#5d4037"; ctx.fill(); 
                
                if (node.piece !== 0) {
                    const radius = 12; 
                    ctx.beginPath(); ctx.arc(node.px, node.py, radius, 0, Math.PI * 2);
                    ctx.fillStyle = node.piece === 1 ? "#e0ccaa" : "#2c2c2c"; 
                    ctx.fill();
                    ctx.lineWidth = 1.5; ctx.strokeStyle = node.piece === 1 ? "#8d6e63" : "#000"; ctx.stroke();
                    
                    if (selectedNode === node) { 
                        ctx.beginPath(); ctx.arc(node.px, node.py, radius + 3, 0, Math.PI * 2);
                        ctx.lineWidth = 2; ctx.strokeStyle = "#4caf50"; ctx.stroke(); 
                    }
                }
            });
        }
    </script>
</body>
</html>
